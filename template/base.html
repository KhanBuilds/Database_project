<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Library System{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fb, #e9eef9); 
            color: #1f2937; 
        }
        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: #ffffff; 
            padding: 28px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); 
        }
        h1, h2, h3 { margin-top: 0; }
        .muted { color: #6b7280; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .btn { 
            display: inline-block; 
            text-decoration: none; 
            padding: 10px 14px; 
            border-radius: 8px; 
            background: #2563eb; 
            color: #ffffff; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
        }
        .btn.secondary { background: #4b5563; }
        form { display: grid; gap: 12px; margin-top: 10px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; }
        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #d1d5db; 
            border-radius: 8px; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 14px; }
        th, td { 
            border-bottom: 1px solid #e5e7eb; 
            padding: 10px; 
            text-align: left; 
            vertical-align: top; 
        }
        th { background: #f9fafb; }
        .error { 
            background: #fee2e2; 
            color: #991b1b; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 12px 0; 
        }
        .success { 
            background: #dcfce7; 
            color: #166534; 
            padding: 12px; 
            border-radius: 8px; 
            margin: 12px 0; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>{% block header %}{% endblock %}</h2>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
